name: Publish policy

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6,18 * * *"
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - ".github/workflows/publish-policy.yml"
      - "tools/generate_policy.py"
      - "tools/sync_source_diagnostics_issues.py"
      - "tools/check_project_identity.py"
      - "tools/check_version_consistency.py"
      - "tools/scan_for_secret_material.py"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "win11_release_guard/**"
      - "wiki/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  sync-source-diagnostics-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile
        run: python -m compileall -q win11_release_guard tools

      - name: Test source diagnostics issue sync
        run: >
          pytest -q
          tests/test_source_diagnostics_issue_sync.py
          tests/test_source_diagnostics_issue_metadata.py
          tests/test_policy_generator.py

      - name: Generate unsigned policy preview
        run: |
          python tools/generate_policy.py \
            --output-dir .tmp/source-diagnostics-policy

      - name: Sync source diagnostics issues
        id: issue_sync
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python tools/sync_source_diagnostics_issues.py \
            --policy-file .tmp/source-diagnostics-policy/windows-release-policy.json \
            --repository "${{ github.repository }}" \
            --create-limit 10 \
            --request-delay-seconds 1 \
            --issue-status-output .tmp/source-diagnostics-issue-status/issue-status.json

      - name: Write degraded issue status when sync fails
        if: ${{ steps.issue_sync.outcome != 'success' }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/source-diagnostics-issue-status
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "issue_status": {},
              "issue_sync": {
                  "status": "unavailable",
                  "reason": "github_issues_sync_failed",
                  "message": (
                      "GitHub Issues sync failed during publish-policy; "
                      "signed policy was generated without source-diagnostic ticket links."
                  ),
              },
          }
          path = Path(".tmp/source-diagnostics-issue-status/issue-status.json")
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          echo "::warning::Source diagnostics GitHub Issues sync failed; publishing degraded issue metadata."

      - uses: actions/upload-artifact@v7
        with:
          name: source-diagnostics-issue-status
          path: .tmp/source-diagnostics-issue-status/issue-status.json
          if-no-files-found: error

  build:
    needs: sync-source-diagnostics-issues
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile
        run: python -m compileall -q win11_release_guard tools

      - name: Test
        run: pytest -q

      - uses: actions/download-artifact@v8
        with:
          name: source-diagnostics-issue-status
          path: .tmp/source-diagnostics-issue-status

      - name: Generate signed policy
        env:
          WIN11_RELEASE_GUARD_POLICY_SIGNING_KEY_B64: ${{ secrets.WIN11_RELEASE_GUARD_POLICY_SIGNING_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${WIN11_RELEASE_GUARD_POLICY_SIGNING_KEY_B64:-}" ]; then
            echo "::error::WIN11_RELEASE_GUARD_POLICY_SIGNING_KEY_B64 is required for production policy publishing."
            exit 1
          fi
          mkdir -p .tmp/source-diagnostics-issue-status
          if [ ! -s ".tmp/source-diagnostics-issue-status/issue-status.json" ]; then
            echo "::error::source diagnostics issue status artifact is missing."
            exit 1
          fi
          python tools/generate_policy.py \
            --output-dir site \
            --write-index \
            --write-robots \
            --write-sitemap \
            --write-manifest \
            --source-diagnostic-issue-status-file .tmp/source-diagnostics-issue-status/issue-status.json \
            --signing-key-env WIN11_RELEASE_GUARD_POLICY_SIGNING_KEY_B64
          touch site/.nojekyll

      - name: Validate policy and signature
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from win11_release_guard.policy_schema import validate_policy_document
          from win11_release_guard.signing import verify_policy_signature

          policy_path = Path("site/windows-release-policy.json")
          signature_path = Path("site/windows-release-policy.json.sig")
          policy_bytes = policy_path.read_bytes()
          signature_bytes = signature_path.read_bytes()
          policy = json.loads(policy_bytes.decode("utf-8"))
          validate_policy_document(policy)
          if not verify_policy_signature(policy_bytes, signature_bytes):
              raise SystemExit("published policy signature verification failed")
          events = policy.get("source_diagnostics", {}).get("events", [])
          error_events = [
              event
              for event in events
              if isinstance(event, dict) and event.get("severity") == "error"
          ]
          if error_events:
              kinds = ", ".join(str(event.get("kind") or "unknown") for event in error_events)
              raise SystemExit(f"source diagnostics error events block publish: {kinds}")
          PY

      - name: Check project identity
        run: python tools/check_project_identity.py

      - name: Check version consistency
        run: python tools/check_version_consistency.py

      - name: Scan for secret material
        run: >
          python tools/scan_for_secret_material.py
          site
          win11_release_guard
          tests
          tools
          docs
          wiki
          README.md
          CHANGELOG.md
          AGENTS.md
          pyproject.toml
          .github

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - id: deployment
        uses: actions/deploy-pages@v5

  verify-live-pages:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify live Pages policy feed
        run: |
          set -euo pipefail
          attempts=8
          delay_seconds=15
          for attempt in $(seq 1 "$attempts"); do
            echo "Live Pages verification attempt ${attempt}/${attempts}"
            if python -m win11_release_guard --check-policy-source --check-public-pages; then
              exit 0
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::Live Pages/API/signature/manifest verification failed after ${attempts} attempts."
              exit 1
            fi
            sleep "$delay_seconds"
          done

name: Publish Python package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.3.4. Leave blank for build/twine/self-test only."
        required: false
        type: string
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package-name: ${{ steps.package_metadata.outputs.package_name }}
      version: ${{ steps.package_metadata.outputs.version }}
      expected-tag: ${{ steps.package_metadata.outputs.expected_tag }}
      publish-enabled: ${{ steps.package_metadata.outputs.publish_enabled }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Select publish ref
        id: publish_ref
        shell: bash
        run: |
          set -euo pipefail
          publish_enabled="false"
          event_tag=""

          if [ "${{ github.event_name }}" = "release" ]; then
            event_tag="${{ github.event.release.tag_name }}"
            publish_enabled="true"
          elif [ -n "${{ inputs.tag }}" ]; then
            event_tag="${{ inputs.tag }}"
            publish_enabled="true"
          fi

          if [ "$publish_enabled" = "true" ]; then
            if ! [[ "$event_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::PyPI publish ref must be an existing vX.Y.Z tag, got ${event_tag}."
              exit 1
            fi
            if ! git rev-parse -q --verify "refs/tags/${event_tag}^{commit}" >/dev/null; then
              echo "::error::PyPI publish tag ${event_tag} does not exist in this repository."
              exit 1
            fi
            git checkout --detach "$event_tag"
          else
            echo "Manual dispatch without tag: build/twine/self-test only; publish job will be skipped."
          fi

          echo "publish_enabled=${publish_enabled}" >> "$GITHUB_OUTPUT"
          echo "event_tag=${event_tag}" >> "$GITHUB_OUTPUT"
      - name: Resolve package metadata and release ref
        id: package_metadata
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["name"])
          PY
          )"
          package_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          expected_tag="v${package_version}"
          publish_enabled="${{ steps.publish_ref.outputs.publish_enabled }}"
          event_tag="${{ steps.publish_ref.outputs.event_tag }}"

          if [ "$publish_enabled" = "true" ]; then
            requested_version="${event_tag#v}"
            if [ "$requested_version" != "$package_version" ]; then
              echo "::error::Tag version ${requested_version} does not match pyproject version ${package_version}."
              exit 1
            fi
            if [ "$event_tag" != "$expected_tag" ]; then
              echo "::error::Release tag ${event_tag} does not match expected ${expected_tag}."
              exit 1
            fi
          else
            echo "Build-only PyPI workflow run for package version ${package_version}."
          fi
          if [ "$package_name" != "win11_release_guard" ]; then
            echo "::error::Unexpected package name ${package_name}."
            exit 1
          fi

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "expected_tag=${expected_tag}" >> "$GITHUB_OUTPUT"
          echo "publish_enabled=${publish_enabled}" >> "$GITHUB_OUTPUT"
      - name: Install test and package build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install --upgrade build twine
      - name: Compile Python sources
        run: python -m compileall -q win11_release_guard tools tests
      - name: Check project identity
        run: python tools/check_project_identity.py
      - name: Check version consistency
        run: python tools/check_version_consistency.py
      - name: Audit GitHub action versions
        run: python tools/check_github_action_versions.py
      - name: Run test suite
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q --durations=20
      - name: Run package self-test
        run: python -m win11_release_guard --self-test
      - name: Scan for secret material
        run: >
          python tools/scan_for_secret_material.py
          README.md
          CHANGELOG.md
          AGENTS.md
          docs
          wiki
          win11_release_guard
          tests
          tools
          pyproject.toml
          .github
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Upload package distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-to-pypi:
    needs: build
    if: needs.build.outputs.publish-enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.build.outputs.package-name }}/
    permissions:
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
